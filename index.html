<!DOCTYPE html>
<html>
<head>
<title>KK Partizan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
button:hover {
    transform: scale(1.05);
    transition: 0.2s;
}

.active-btn {
    border: 2px solid white !important;
}

.card {
    background-color: #1e1e1e;
}

</style>

</head>

<body class="bg-dark text-white">

<div class="container text-center">

<h1 class="mt-3">🏀 KK Partizan</h1>

<img src="partizan.jpg" 
     class="img-fluid my-4" 
     style="max-width:300px;">

<p class="lead">Najbolji klub ⚫⚪</p>


<div class="mb-3">
<button id="btn-ekipa" class="btn btn-primary" onclick="show('ekipa', this)">
<i class="bi bi-people"></i> Ekipa
</button>

<button id="btn-tabela" class="btn btn-success" onclick="show('tabela', this)">
<i class="bi bi-list-ol"></i> Tabela
</button>

<button id="btn-aba" class="btn btn-warning" onclick="show('aba', this)">
<i class="bi bi-trophy"></i> ABA
</button>

<button id="btn-stat" class="btn btn-danger" onclick="show('stat', this)">
<i class="bi bi-bar-chart"></i> Stat
</button>
</div>

<hr>

<div id="ekipa">
<h2>Ekipa</h2>

<div class="row">

<div class="col-md-4">
<div class="card p-3">
<h5>Punter</h5>
<span class="badge bg-primary">Bek</span>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>LeDay</h5>
<span class="badge bg-success">Krilo</span>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Nunnally</h5>
<span class="badge bg-warning text-dark">Šuter</span>
</div>
</div>

</div>
</div>

<div id="tabela" style="display:none;">
<h2>Tabela</h2>

<ul class="list-group">
<li class="list-group-item bg-dark text-white">1. Real</li>
<li class="list-group-item bg-dark text-white">2. Barca</li>
<li class="list-group-item bg-dark text-white">3. Oly</li>
<li class="list-group-item bg-dark text-white">4. Partizan 🔥</li>
</ul>

</div>

<!-- ABA -->
<div id="aba" style="display:none;">
<h2>ABA Liga</h2>

<div class="alert alert-warning">
🏆 Partizan je prvi!
</div>

<p>2. Zvezda</p>
<p>3. Budućnost</p>

</div>

<!-- Stat -->
<div id="stat" style="display:none;">
<h2>Statistika</h2>

<div class="card p-3 mb-2">
Punter <span class="badge bg-danger">15 PPG</span>
</div>

<div class="card p-3">
LeDay <span class="badge bg-danger">13 PPG</span>
</div>

</div>

</div>

<script>
function show(x, btn) {


  document.getElementById('ekipa').style.display='none';
  document.getElementById('tabela').style.display='none';
  document.getElementById('aba').style.display='none';
  document.getElementById('stat').style.display='none';

  document.querySelectorAll("button").forEach(b => b.classList.remove("active-btn"));

  document.getElementById(x).style.display='block';

  btn.classList.add("active-btn");
}
</script>

</body>
</html>
