<!DOCTYPE html>
<html>
<head>
<title>KK Partizan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>

body {
    background: linear-gradient(135deg, #000000, #2c2c2c);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

h1 {
    font-weight: bold;
}

/* Dugmad */
button {
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.active-btn {
    border: 2px solid white !important;
    box-shadow: 0 0 10px white;
}

/* Kartice */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 20px rgba(255,255,255,0.2);
}

/* Animacija */
.fade-in {
    animation: fade 0.5s ease-in-out;
}

@keyframes fade {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* Progress bar */
.progress {
    height: 25px;
}

</style>

</head>

<body>

<div class="container text-center">

<h1 class="mt-3">🏀 KK Partizan</h1>

<img src="partizan.jpg" 
     class="img-fluid my-4 rounded shadow" 
     style="max-width:300px;">

<p class="lead">Najbolji klub ⚫⚪</p>

<div class="mb-3">

<button class="btn btn-primary" onclick="show('ekipa', this)">
<i class="bi bi-people"></i> Ekipa
</button>

<button class="btn btn-success" onclick="show('tabela', this)">
<i class="bi bi-list-ol"></i> Tabela
</button>

<button class="btn btn-warning" onclick="show('aba', this)">
<i class="bi bi-trophy"></i> ABA
</button>

<button class="btn btn-danger" onclick="show('stat', this)">
<i class="bi bi-bar-chart"></i> Stat
</button>

</div>

<hr>

<!-- EKIPA -->
<div id="ekipa" class="fade-in">

<h2>Ekipa</h2>

<div class="row">

<div class="col-md-4">
<div class="card p-3">
<h5>Punter 🔥</h5>
<span class="badge bg-primary">Bek</span>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>LeDay 💪</h5>
<span class="badge bg-success">Krilo</span>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Nunnally 🎯</h5>
<span class="badge bg-warning text-dark">Šuter</span>
</div>
</div>

</div>
</div>

<!-- TABELA -->
<div id="tabela" style="display:none;" class="fade-in">

<h2>Tabela</h2>

<ul class="list-group">
<li class="list-group-item bg-dark text-white">1. Real 🏆</li>
<li class="list-group-item bg-dark text-white">2. Barca</li>
<li class="list-group-item bg-dark text-white">3. Oly</li>
<li class="list-group-item bg-dark text-white fw-bold text-warning">4. Partizan 🔥</li>
</ul>

</div>

<!-- ABA -->
<div id="aba" style="display:none;" class="fade-in">

<h2>ABA Liga</h2>

<div class="alert alert-warning text-dark fw-bold">
🏆 Partizan je prvi!
</div>

<p>2. Zvezda</p>
<p>3. Budućnost</p>

</div>

<!-- STAT -->
<div id="stat" style="display:none;" class="fade-in">

<h2>Statistika</h2>

<div class="card p-3 mb-3">
Punter
<div class="progress mt-2">
<div class="progress-bar bg-danger" style="width:75%">15 PPG</div>
</div>
</div>

<div class="card p-3">
LeDay
<div class="progress mt-2">
<div class="progress-bar bg-danger" style="width:65%">13 PPG</div>
</div>
</div>

</div>

</div>

<script>

function show(x, btn) {

  document.getElementById('ekipa').style.display='none';
  document.getElementById('tabela').style.display='none';
  document.getElementById('aba').style.display='none';
  document.getElementById('stat').style.display='none';

  document.querySelectorAll("button").forEach(b => b.classList.remove("active-btn"));

  let section = document.getElementById(x);
  section.style.display='block';

  section.classList.remove("fade-in");
  void section.offsetWidth;
  section.classList.add("fade-in");

  btn.classList.add("active-btn");
}

</script>

</body>
</html>
